services:
  project-dm:
    build: .
    container_name: project-dm-web
    env_file:
      - .env
    environment:
      PROJECT_DM_ATTENDED_BROWSER: "1"
      PROJECT_DM_BROWSER_PUBLIC_URL: ${PROJECT_DM_BROWSER_PUBLIC_URL:-https://vnc.windogs.win}
    expose:
      - "8000"
      - "5900"
      - "6080"
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    external: true
